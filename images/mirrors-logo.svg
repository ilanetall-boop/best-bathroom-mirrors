<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="12" fill="#283593"/>
  <!-- Mirror frame (round) -->
  <circle cx="28" cy="26" r="15" fill="none" stroke="#C5CAE9" stroke-width="3"/>
  <!-- Mirror glass -->
  <circle cx="28" cy="26" r="12" fill="#7986CB" opacity="0.4"/>
  <!-- Reflection shine -->
  <path d="M22,20 Q24,18 26,20" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M20,24 Q21,22 22,24" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Wall mount -->
  <rect x="26" y="10" width="4" height="3" rx="1" fill="#9FA8DA"/>
  <!-- Shelf under mirror -->
  <rect x="18" y="42" width="20" height="3" rx="1.5" fill="#9FA8DA"/>
  <rect x="24" y="45" width="8" height="2" rx="1" fill="#7986CB"/>
</svg>